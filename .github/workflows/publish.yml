# Publish to PyPI on tag push (vX.Y.Z) via trusted publishing — no API tokens.
# Inert until the one-time PyPI setup in RELEASING.md is done.
name: publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          git config --global user.email ci@example.invalid
          git config --global user.name ci
          python3 testing/test_reconstruct.py
          python3 testing/test_acceptance.py
      - name: Build sdist + wheel
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
